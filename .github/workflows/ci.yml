  artifact-upload:
    name: Upload Build Artifact
    runs-on: ubuntu-latest

    needs:
      - code-quality
      - automated-tests
      - syntax-check

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload Project Files
        uses: actions/upload-artifact@v4
        with:
          name: quickpos-build-files
          path: |
            .
            !vendor
            !.git