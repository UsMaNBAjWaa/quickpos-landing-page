name: QuickPOS CI/CD Pipeline

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - "feature/**"
      - "bugfix/**"

jobs:
  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: latest

      - name: Run PHP Syntax Check
        run: |
          find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l
name: QuickPOS CI/CD Pipeline

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - "feature/**"
      - "bugfix/**"

jobs:
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: latest
          tools: composer

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHP CodeSniffer
        run: vendor/bin/phpcs

  automated-tests:
    name: Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: latest
          tools: composer

      - name: Install Dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPUnit Tests
        run: vendor/bin/phpunit tests

  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: latest

      - name: Run PHP Syntax Check
        run: |
          find . -name "*.php" -not -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  artifact-upload:
    name: Upload Build Artifact
    runs-on: ubuntu-latest
    needs:
      - commit-validation
      - code-quality
      - automated-tests
      - syntax-check

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload Project Files
        uses: actions/upload-artifact@v4
        with:
          name: quickpos-build-files
          path: |
            .
            !vendor
            !.git
  commit-validation:
    name: Validate Jira Commit ID
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: |
          git log origin/develop..HEAD --format=%s | while read message; do
            echo "Checking commit: $message"
            if ! echo "$message" | grep -Eq '^\[POS-[0-9]+\]'; then
              echo "Invalid commit message: $message"
              echo "Commit must start with Jira ID, example: [POS-205] Add commit validation"
              exit 1
            fi
          done

